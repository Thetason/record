name: ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/record
      DATABASE_URL_UNPOOLED: postgresql://placeholder:placeholder@localhost:5432/record
      POSTGRES_URL: postgresql://placeholder:placeholder@localhost:5432/record
      POSTGRES_PRISMA_URL: postgresql://placeholder:placeholder@localhost:5432/record
      NEXTAUTH_SECRET: ci-placeholder-secret-12345678901234567890
      NEXTAUTH_URL: https://www.recordyours.com
      NEXT_PUBLIC_URL: https://www.recordyours.com
      ENABLE_OCR: 'false'
      ENABLE_EMAIL: 'false'
      HEALTHCHECK_TOKEN: ci-health-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Tracked secret scan
        run: npm run secrets:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: OCR fixtures
        run: npm run ocr:fixtures

      - name: Production audit gate
        run: npm run audit:prod

  smoke-local:
    runs-on: ubuntu-latest
    needs: quality
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/record
      DATABASE_URL_UNPOOLED: postgresql://placeholder:placeholder@localhost:5432/record
      POSTGRES_URL: postgresql://placeholder:placeholder@localhost:5432/record
      POSTGRES_PRISMA_URL: postgresql://placeholder:placeholder@localhost:5432/record
      NEXTAUTH_SECRET: ci-dev-secret-12345678901234567890
      NEXTAUTH_URL: http://127.0.0.1:3016
      NEXT_PUBLIC_URL: http://127.0.0.1:3016
      ENABLE_OCR: 'false'
      ENABLE_EMAIL: 'false'
      HEALTHCHECK_TOKEN: ci-health-token
      DEMO_SEED_CONFIRM: 'YES'
      SMOKE_PORT: '3016'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prepare local database
        run: npm run db:push:smoke

      - name: Seed demo data
        run: npm run seed:demo:smoke

      - name: Smoke test
        run: npm run smoke:local
